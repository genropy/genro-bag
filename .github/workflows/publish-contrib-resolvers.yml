name: Publish contrib-resolvers to PyPI

"on":
  push:
    tags:
      - 'contrib-resolvers-v*'
  workflow_dispatch:

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Build package
        run: python -m build
        working-directory: contrib/resolvers

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v4
        with:
          name: contrib-resolvers-distributions
          path: contrib/resolvers/dist/

  publish-to-pypi:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/contrib-resolvers-v')
    environment:
      name: release
      url: https://pypi.org/p/genro-bag-contrib-resolvers
    permissions:
      id-token: write

    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@v4
        with:
          name: contrib-resolvers-distributions
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  github-release:
    name: Create GitHub Release
    needs: publish-to-pypi
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/contrib-resolvers-v')
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download distribution artifacts
        uses: actions/download-artifact@v4
        with:
          name: contrib-resolvers-distributions
          path: dist/

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          gh release create '${{ github.ref_name }}' \
            --repo='${{ github.repository }}' \
            --title='genro-bag-contrib-resolvers ${{ github.ref_name }}' \
            --generate-notes \
            dist/*
